services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mesenshuttle-frontend
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: mesenshuttle-backend
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8080
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mesenshuttle-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mesenshuttle
      MYSQL_USER: mesen_user
      MYSQL_PASSWORD: mesen_password
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mesenshuttle-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
