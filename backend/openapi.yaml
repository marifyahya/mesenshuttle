openapi: 3.0.3
info:
  title: Mesenshuttle Admin API
  version: 1.0.0
  description: API documentation for Mesenshuttle Backend Admin Panel.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /api
    description: Base API URL
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          format: password
          example: password123
    Admin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    Route:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        OriginCity:
          type: string
          example: Jakarta
        OriginPool:
          type: string
          example: Pool Kebon Jeruk
        DestinationCity:
          type: string
          example: Bandung
        DestinationPool:
          type: string
          example: Pool Pasteur
        CreatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        status:
          type: string

paths:
  /admin/login:
    post:
      summary: Admin Login
      operationId: adminLogin
      description: Authenticate an admin and receive a JWT token.
      tags:
        - Admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      admin:
                        $ref: '#/components/schemas/Admin'
        '400':
          description: Bad Request (Invalid payload)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (Invalid credentials)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/routes:
    get:
      summary: Get Routes
      operationId: getAdminRoutes
      description: Retrieve a list of all routes. Requires a valid JWT token.
      tags:
        - Admin Routes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Routes retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized (Token is missing or invalid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
