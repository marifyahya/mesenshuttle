openapi: 3.0.3
info:
  title: Mesenshuttle Admin API
  version: 1.0.0
  description: API documentation for Mesenshuttle Backend Admin Panel.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /api
    description: Base API URL
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          format: password
          example: password123
    Admin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    Route:
      type: object
      properties:
        id:
          type: string
          format: uuid
        origin_city:
          type: string
          example: Jakarta
        origin_pool:
          type: string
          example: Pool Kebon Jeruk
        destination_city:
          type: string
          example: Bandung
        destination_pool:
          type: string
          example: Pool Pasteur
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: Validation failed
        data:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

paths:
  /admin/login:
    post:
      summary: Admin Login
      operationId: adminLogin
      description: Authenticate an admin and receive a JWT token.
      tags:
        - Admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      admin:
                        $ref: '#/components/schemas/Admin'
        '400':
          description: Bad Request (Invalid payload)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (Invalid credentials)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/routes:
    get:
      summary: Get Routes
      operationId: getAdminRoutes
      description: Retrieve a list of all routes. Requires a valid JWT token.
      tags:
        - Admin Routes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: A list of routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Routes retrieved successfully
                  data:
                    type: object
                    properties:
                      total_count:
                        type: integer
                        example: 50
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Route'
        '401':
          description: Unauthorized (Token is missing or invalid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create Route
      operationId: createAdminRoute
      description: Create a new route. Requires a valid JWT token.
      tags:
        - Admin Routes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - origin_city
                - origin_pool
                - destination_city
                - destination_pool
              properties:
                origin_city:
                  type: string
                  example: Jakarta
                origin_pool:
                  type: string
                  example: Pool Kebon Jeruk
                destination_city:
                  type: string
                  example: Bandung
                destination_pool:
                  type: string
                  example: Pool Pasteur
      responses:
        '201':
          description: Route created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Route created successfully
                  data:
                    $ref: '#/components/schemas/Route'
        '400':
          description: Bad Request (Invalid payload)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (Token is missing or invalid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
